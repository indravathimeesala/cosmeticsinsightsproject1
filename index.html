<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetics Insights</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        }

        .container{
            text-align:center;
            background:white;
            padding:50px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            max-width:600px;
        }

        h1{
            color:#d63384;
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            color:#555;
            font-size:1.1rem;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background:#d63384;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            background:#b0256c;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Cosmetics Insights</h1>

        <p>
            Explore cosmetic product trends, brand performance,
            pricing analysis, category distribution, and consumer insights
            through an interactive Tableau dashboard.
        </p>

        <a class="btn"
           href="https://public.tableau.com/views/CosmeticsInsights_17834274964890/CosmeticsInsights"
           target="_blank">
            Get Insights
        </a>
    </div>

</body>
</html>
